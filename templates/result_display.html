<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Analysis - Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.24/css/dataTables.bootstrap5.min.css">
    <style>
        body {
            padding: 20px;
        }
        .table-container {
            margin: 20px 0;
            overflow-x: auto;
        }
        .download-button {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item"><a href="/result-analysis">Result Analysis</a></li>
                <li class="breadcrumb-item active">Results</li>
            </ol>
        </nav>

        <h1 class="mb-4">Result Analysis</h1>
        
        <div class="alert alert-success">
            File processed successfully: {{ filename }}
        </div>

        <div class="download-button">
            <a href="{{ url_for('download_result_analysis') }}" class="btn btn-primary">
                <i class="fas fa-download"></i> Download Excel File
            </a>
        </div>

        <h2 class="mb-3">Overall Ranking</h2>
        <div class="table-container">
            {{ ranking_table | safe }}
        </div>

        <h2 class="mb-3 mt-5">Marks Details </h2>
        <div class="table-container">
            {{ subject_table | safe }}
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/dataTables.bootstrap5.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.table').DataTable({
                pageLength: 25,
                responsive: true
            });
        });
    </script>
</body>
</html>
